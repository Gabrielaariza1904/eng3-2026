<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quartos - Hotel Imperial</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <!-- Main Content -->
    <main class="flex-1 p-8">
        <header>
            <h2>Gestão de Quartos</h2>
            <div>
                <a href="quartos-form.html" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-xl shadow-lg shadow-blue-600/20 transition-all duration-200 text-sm flex items-center gap-2">
                    <span>➕</span> Novo Quarto
                </a>
            </div>
        </header>

        <!-- Filtros -->
        <section class="glass-card p-5 rounded-2xl shadow-sm mb-6 flex flex-col md:flex-row gap-4 items-end fade-in-up">
            <div class="flex-1 w-full">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Filtrar por Número</label>
                <input type="text" id="filtro-numero" oninput="filtrarQuartos()" class="w-full border border-slate-200 rounded-xl p-2.5 pl-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm" placeholder="Buscar por número do quarto...">
            </div>
            <div class="w-full md:w-56">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Tipo de Quarto</label>
                <select id="filtro-tipo" onchange="filtrarQuartos()" class="w-full border border-slate-200 rounded-xl p-2.5 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm">
                    <option value="todos">Todos os Tipos</option>
                    <option value="Standard Casal">Standard Casal</option>
                    <option value="Standard Solteiro">Standard Solteiro</option>
                    <option value="Luxo Casal">Luxo Casal</option>
                    <option value="Luxo Duplo">Luxo Duplo</option>
                    <option value="Suíte Master">Suíte Master</option>
                    <option value="Suíte Premium">Suíte Premium</option>
                </select>
            </div>
            <div class="w-full md:w-48">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Status</label>
                <select id="filtro-status" onchange="filtrarQuartos()" class="w-full border border-slate-200 rounded-xl p-2.5 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm">
                    <option value="todos">Todos</option>
                    <option value="DISPONIVEL">Disponível</option>
                    <option value="OCUPADO">Ocupado</option>
                    <option value="MANUTENCAO">Manutenção</option>
                </select>
            </div>
        </section>

        <!-- Tabela -->
        <section class="glass-card rounded-2xl shadow-sm overflow-hidden fade-in-up" style="animation-delay: 0.1s">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-100">
                    <thead class="bg-slate-50/50">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Número</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Tipo</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Capacidade</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Valor Diária</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-4 text-right text-xs font-bold text-slate-500 uppercase tracking-wider">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-quartos" class="bg-transparent divide-y divide-slate-100 text-slate-700">
                        <!-- Gerado Dinamicamente -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="assets/js/db.js"></script>
    <script src="assets/js/layout.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            carregarQuartos();
        });

        function carregarQuartos() {
            filtrarQuartos();
        }

        function renderizarTabela(quartosList) {
            const tbody = document.getElementById('tabela-quartos');
            tbody.innerHTML = '';

            if (quartosList.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-8 text-center text-sm text-slate-500">
                            Nenhum quarto encontrado para os filtros selecionados.
                        </td>
                    </tr>
                `;
                return;
            }

            quartosList.forEach(q => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50/40 transition-colors';

                // Status Badge e Classes
                let badgeClass = '';
                let badgeText = '';
                if (q.status === 'DISPONIVEL') {
                    badgeClass = 'bg-green-100 text-green-800';
                    badgeText = 'Disponível';
                } else if (q.status === 'OCUPADO') {
                    badgeClass = 'bg-red-100 text-red-800';
                    badgeText = 'Ocupado';
                } else {
                    badgeClass = 'bg-amber-100 text-amber-800';
                    badgeText = 'Manutenção';
                }

                const formatMoeda = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(q.valorDiaria);

                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-extrabold text-slate-900">${q.numero}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">${q.tipo}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">${q.capacidadeAdultos} Adulto(s) / ${q.capacidadeCriancas} Criança(s)</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-slate-700">${formatMoeda}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <span class="inline-flex items-center text-xs font-semibold px-2.5 py-0.5 rounded-full ${badgeClass}">
                            ${badgeText}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <a href="quartos-form.html?id=${q.id}" class="text-blue-600 hover:text-blue-900 font-semibold mr-4 transition-all">Editar</a>
                        <button onclick="excluirQuarto(${q.id}, '${q.numero}')" class="text-red-600 hover:text-red-900 font-semibold transition-all">Excluir</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filtrarQuartos() {
            const numero = document.getElementById('filtro-numero').value.trim();
            const tipo = document.getElementById('filtro-tipo').value;
            const status = document.getElementById('filtro-status').value;

            let quartos = HotelDB.DAOs.quartos.obterTudo();

            if (numero) {
                quartos = quartos.filter(q => q.numero.includes(numero));
            }

            if (tipo !== 'todos') {
                quartos = quartos.filter(q => q.tipo === tipo);
            }

            if (status !== 'todos') {
                quartos = quartos.filter(q => q.status === status);
            }

            renderizarTabela(quartos);
        }

        function excluirQuarto(id, numero) {
            if (confirm(`Deseja realmente excluir o Quarto ${numero}?`)) {
                // Verificar se quarto está em reservas ativas
                const reservas = HotelDB.DAOs.reservas.obterTudo();
                const emUso = reservas.find(r => r.quartoId == id && r.status !== 'CANCELADA' && r.status !== 'CONCLUIDA');
                
                if (emUso) {
                    window.mostrarToast(`Não é possível excluir o Quarto ${numero} pois ele está associado a uma reserva ativa (Reserva #${emUso.id}).`, 'erro');
                    return;
                }

                const response = HotelDB.Fachada.remover('quartos', id);
                if (response.sucesso) {
                    window.mostrarToast(`Quarto ${numero} excluído com sucesso!`, 'sucesso');
                    filtrarQuartos();
                } else {
                    window.mostrarToast(response.erro, 'erro');
                }
            }
        }
    </script>
</body>
</html>
