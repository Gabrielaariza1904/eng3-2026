<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Política - Hotel Imperial</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <!-- Main Content -->
    <main class="flex-1 p-8">
        <header>
            <h2 id="form-titulo">Cadastrar Política de Cancelamento</h2>
            <div>
                <a href="politicas-lista.html" class="text-blue-600 hover:text-blue-800 font-semibold text-sm flex items-center gap-1.5">
                    <span>⬅️</span> Voltar para Lista
                </a>
            </div>
        </header>

        <section class="glass-card p-8 rounded-2xl shadow-sm max-w-xl mx-auto fade-in-up">
            <form id="form-politica" class="space-y-6" onsubmit="salvarPolitica(event)">
                <input type="hidden" id="politica-id">

                <div class="space-y-5">
                    <!-- Descrição -->
                    <div>
                        <label for="descricao" class="block text-sm font-semibold text-slate-700 mb-2">Descrição da Política *</label>
                        <input type="text" id="descricao" required class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="Ex: Flexível - Cancelamento grátis até 24h antes">
                    </div>

                    <!-- Horas Antecedencia -->
                    <div>
                        <label for="horasAntecedencia" class="block text-sm font-semibold text-slate-700 mb-2">Horas Limite de Antecedência *</label>
                        <div class="relative">
                            <input type="number" id="horasAntecedencia" min="0" required class="w-full border border-slate-200 rounded-xl p-3 pr-14 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="Ex: 24">
                            <span class="absolute inset-y-0 right-0 pr-4 flex items-center text-sm font-bold text-slate-400">horas</span>
                        </div>
                        <p class="text-[10px] text-slate-400 mt-1">Tempo limite antes do check-in em que a multa de cancelamento começará a ser aplicada.</p>
                    </div>

                    <!-- Percentual Multa -->
                    <div>
                        <label for="percentualMulta" class="block text-sm font-semibold text-slate-700 mb-2">Percentual de Multa (%) *</label>
                        <div class="relative">
                            <input type="number" id="percentualMulta" min="0" max="100" step="0.1" required class="w-full border border-slate-200 rounded-xl p-3 pr-8 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="0.0">
                            <span class="absolute inset-y-0 right-0 pr-4 flex items-center text-sm font-bold text-slate-400">%</span>
                        </div>
                        <p class="text-[10px] text-slate-400 mt-1">Cobrado se o cancelamento ocorrer após as horas limite de antecedência.</p>
                    </div>

                    <!-- Inativo -->
                    <div class="flex items-center gap-2 pt-2">
                        <input type="checkbox" id="inativo" class="h-5 w-5 text-blue-600 focus:ring-blue-500 border-slate-200 rounded-lg">
                        <label for="inativo" class="text-sm font-semibold text-slate-700 cursor-pointer">Marcar como Inativo</label>
                    </div>
                </div>

                <!-- Botões de Ação -->
                <div class="flex justify-end gap-4 border-t border-slate-100 pt-6">
                    <button type="button" onclick="window.location.href='politicas-lista.html'" class="px-6 py-3 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">Cancelar</button>
                    <button type="submit" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl text-sm shadow-lg shadow-blue-600/15 transition-all">Salvar Política</button>
                </div>
            </form>
        </section>
    </main>

    <!-- Scripts -->
    <script src="assets/js/db.js"></script>
    <script src="assets/js/layout.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            detectarModoEdicao();
        });

        function detectarModoEdicao() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (id) {
                document.getElementById('form-titulo').innerText = 'Editar Política de Cancelamento';
                const pol = HotelDB.DAOs.politicas.buscarPorId(id);
                if (pol) {
                    document.getElementById('politica-id').value = pol.id;
                    document.getElementById('descricao').value = pol.descricao;
                    document.getElementById('horasAntecedencia').value = pol.horasAntecedencia;
                    document.getElementById('percentualMulta').value = pol.percentualMulta;
                    document.getElementById('inativo').checked = pol.inativo;
                } else {
                    window.mostrarToast('Política não encontrada!', 'erro');
                    setTimeout(() => window.location.href = 'politicas-lista.html', 1500);
                }
            }
        }

        function salvarPolitica(event) {
            event.preventDefault();

            const id = document.getElementById('politica-id').value;
            const dados = {
                id: id ? parseInt(id) : null,
                descricao: document.getElementById('descricao').value.trim(),
                horasAntecedencia: parseInt(document.getElementById('horasAntecedencia').value),
                percentualMulta: parseFloat(document.getElementById('percentualMulta').value),
                inativo: document.getElementById('inativo').checked
            };

            const response = HotelDB.Fachada.salvar('politicas', dados);

            if (response.sucesso) {
                window.mostrarToast(id ? 'Política de cancelamento atualizada!' : 'Política de cancelamento criada!', 'sucesso');
                setTimeout(() => {
                    window.location.href = 'politicas-lista.html';
                }, 1000);
            } else {
                window.mostrarToast(response.erro, 'erro');
            }
        }
    </script>
</body>
</html>
