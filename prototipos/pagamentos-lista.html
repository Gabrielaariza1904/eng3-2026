<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamentos - Hotel Imperial</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <!-- Main Content -->
    <main class="flex-1 p-8">
        <header>
            <h2>Fluxo de Pagamentos</h2>
            <div>
                <a href="pagamentos-form.html" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-xl shadow-lg shadow-blue-600/20 transition-all duration-200 text-sm flex items-center gap-2">
                    <span>➕</span> Registrar Pagamento
                </a>
            </div>
        </header>

        <!-- Tabela -->
        <section class="glass-card rounded-2xl shadow-sm overflow-hidden fade-in-up">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-100">
                    <thead class="bg-slate-50/50">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Data / Hora</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Reserva / Hóspede</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Valor</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Forma de Pagamento</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-4 text-right text-xs font-bold text-slate-500 uppercase tracking-wider">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-pagamentos" class="bg-transparent divide-y divide-slate-100 text-slate-700">
                        <!-- Gerado Dinamicamente -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="assets/js/db.js"></script>
    <script src="assets/js/layout.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            carregarPagamentos();
        });

        function carregarPagamentos() {
            const pagamentos = HotelDB.DAOs.pagamentos.obterTudo();
            renderizarTabela(pagamentos);
        }

        function renderizarTabela(pagamentosList) {
            const tbody = document.getElementById('tabela-pagamentos');
            tbody.innerHTML = '';

            if (pagamentosList.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-8 text-center text-sm text-slate-500">
                            Nenhum pagamento registrado.
                        </td>
                    </tr>
                `;
                return;
            }

            const reservas = HotelDB.DAOs.reservas.obterTudo();
            const hospedes = HotelDB.DAOs.hospedes.obterTudo();

            // Ordenar pagamentos de forma decrescente por data
            pagamentosList.sort((a, b) => new Date(b.dataPagamento) - new Date(a.dataPagamento));

            pagamentosList.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50/40 transition-colors';

                const reserva = reservas.find(r => r.id == p.reservaId);
                const hospede = reserva ? hospedes.find(h => h.id == r.hospedeId) : null;
                
                const nomeHospede = hospede ? hospede.nome : 'Desconhecido';
                const idReserva = p.reservaId;

                // Formatar Data/Hora
                const dataFormatada = formatarDataHora(p.dataPagamento);

                // Status Badge
                let badgeClass = '';
                let statusText = p.status;
                if (p.status === 'PENDENTE') {
                    badgeClass = 'bg-slate-100 text-slate-800';
                    statusText = 'Pendente';
                } else if (p.status === 'APROVADO') {
                    badgeClass = 'bg-green-100 text-green-800';
                    statusText = 'Aprovado';
                } else if (p.status === 'NEGADO') {
                    badgeClass = 'bg-red-100 text-red-800';
                    statusText = 'Negado';
                } else {
                    badgeClass = 'bg-purple-100 text-purple-800';
                    statusText = 'Estornado';
                }

                // Ações de status
                let acoesHTML = '';
                if (p.status === 'PENDENTE') {
                    acoesHTML += `<button onclick="alterarStatusPagamento(${p.id}, 'APROVADO')" class="text-green-600 hover:text-green-900 font-semibold mr-3 transition-all">Aprovar</button>`;
                    acoesHTML += `<button onclick="alterarStatusPagamento(${p.id}, 'NEGADO')" class="text-red-600 hover:text-red-900 font-semibold transition-all">Negar</button>`;
                } else if (p.status === 'APROVADO') {
                    acoesHTML += `<button onclick="alterarStatusPagamento(${p.id}, 'ESTORNADO')" class="text-purple-600 hover:text-purple-900 font-semibold transition-all">Estornar</button>`;
                } else {
                    acoesHTML += '<span class="text-slate-400 text-xs italic">Sem ações</span>';
                }

                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">${dataFormatada}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-semibold text-slate-900">${nomeHospede}</div>
                        <div class="text-xs text-slate-400">Reserva #${idReserva}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-900">${new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(p.valor)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">${p.formaPagamento}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <span class="inline-flex items-center text-xs font-semibold px-2.5 py-0.5 rounded-full ${badgeClass}">
                            ${statusText}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        ${acoesHTML}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function alterarStatusPagamento(id, novoStatus) {
            const pagamento = HotelDB.DAOs.pagamentos.buscarPorId(id);
            if (pagamento) {
                pagamento.status = novoStatus;
                
                // Se for estornado, podemos mostrar um aviso
                if (novoStatus === 'ESTORNADO') {
                    if (!confirm('Deseja realmente estornar este pagamento? O saldo pendente da reserva será recalculado.')) {
                        return;
                    }
                }

                const response = HotelDB.Fachada.salvar('pagamentos', pagamento);
                if (response.sucesso) {
                    window.mostrarToast(`Status do pagamento #${id} atualizado para ${novoStatus}!`, 'sucesso');
                    carregarPagamentos();
                } else {
                    window.mostrarToast(response.erro, 'erro');
                }
            }
        }

        // Helpers de Data
        function formatarDataHora(dataStr) {
            if (!dataStr) return '';
            const data = new Date(dataStr);
            if (isNaN(data.getTime())) return dataStr;
            
            const dia = String(data.getDate()).padStart(2, '0');
            const mes = String(data.getMonth() + 1).padStart(2, '0');
            const ano = data.getFullYear();
            const horas = String(data.getHours()).padStart(2, '0');
            const minutos = String(data.getMinutes()).padStart(2, '0');
            
            return `${dia}/${mes}/${ano} às ${horas}:${minutos}`;
        }
    </script>
</body>
</html>
