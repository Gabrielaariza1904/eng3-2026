<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóspedes - Hotel Imperial</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <!-- Main Content -->
    <main class="flex-1 p-8">
        <header>
            <h2>Consultar Hóspedes</h2>
            <div>
                <a href="hospedes-form.html" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-xl shadow-lg shadow-blue-600/20 transition-all duration-200 text-sm flex items-center gap-2">
                    <span>➕</span> Novo Hóspede
                </a>
            </div>
        </header>

        <!-- Filtros -->
        <section class="glass-card p-5 rounded-2xl shadow-sm mb-6 flex flex-col md:flex-row gap-4 items-end fade-in-up">
            <div class="flex-1 w-full">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Buscar Hóspede</label>
                <div class="relative">
                    <input type="text" id="filtro-busca" oninput="filtrarTabela()" class="w-full border border-slate-200 rounded-xl p-2.5 pl-4 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm" placeholder="Buscar por Nome ou CPF...">
                </div>
            </div>
            <div class="w-full md:w-48">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Status</label>
                <select id="filtro-status" onchange="filtrarTabela()" class="w-full border border-slate-200 rounded-xl p-2.5 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm">
                    <option value="ativos">Ativos</option>
                    <option value="inativos">Inativos</option>
                    <option value="todos">Todos</option>
                </select>
            </div>
        </section>

        <!-- Tabela -->
        <section class="glass-card rounded-2xl shadow-sm overflow-hidden fade-in-up" style="animation-delay: 0.1s">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-100">
                    <thead class="bg-slate-50/50">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Hóspede</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">CPF</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Telefone</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Cidade/UF</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-4 text-right text-xs font-bold text-slate-500 uppercase tracking-wider">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-hospedes" class="bg-transparent divide-y divide-slate-100 text-slate-700">
                        <!-- Gerado Dinamicamente -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal de Confirmação de Inativação -->
    <div id="modal-confirmacao" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl transform scale-95 transition-all duration-300">
            <h3 id="modal-titulo" class="text-lg font-bold text-slate-900 mb-2">Confirmar Ação</h3>
            <p id="modal-texto" class="text-sm text-slate-500 mb-6">Deseja realmente alterar o status deste hóspede?</p>
            
            <div class="flex justify-end gap-3">
                <button onclick="fecharModal()" class="px-4 py-2 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50">Cancelar</button>
                <button id="modal-btn-confirmar" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl text-sm font-semibold shadow-lg shadow-red-600/15">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/db.js"></script>
    <script src="assets/js/layout.js"></script>
    
    <script>
        let hospedeSelecionadoId = null;
        let acaoSelecionada = null; // 'inativar' ou 'reativar'

        document.addEventListener('DOMContentLoaded', () => {
            carregarHospedes();
        });

        function carregarHospedes() {
            filtrarTabela();
        }

        function renderizarTabela(hospedesList) {
            const tbody = document.getElementById('tabela-hospedes');
            tbody.innerHTML = '';

            if (hospedesList.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-8 text-center text-sm text-slate-500">
                            Nenhum hóspede encontrado para os filtros selecionados.
                        </td>
                    </tr>
                `;
                return;
            }

            hospedesList.forEach(h => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50/40 transition-colors';
                
                // Status badge
                const statusBadge = h.inativo 
                    ? `<span class="inline-flex items-center text-xs font-semibold px-2.5 py-0.5 rounded-full bg-red-100 text-red-800">Inativo</span>`
                    : `<span class="inline-flex items-center text-xs font-semibold px-2.5 py-0.5 rounded-full bg-green-100 text-green-800">Ativo</span>`;

                // Ação de status (Inativar ou Reativar)
                const acaoStatus = h.inativo
                    ? `<button onclick="confirmarAcao(${h.id}, 'reativar')" class="text-green-600 hover:text-green-900 font-semibold transition-all">Reativar</button>`
                    : `<button onclick="confirmarAcao(${h.id}, 'inativar')" class="text-red-600 hover:text-red-900 font-semibold transition-all">Inativar</button>`;

                const cidadeUf = h.endereco ? `${h.endereco.cidade}/${h.endereco.estado}` : '-';

                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-semibold text-slate-900">${h.nome}</div>
                        <div class="text-xs text-slate-400">${h.email}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">${h.cpf}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">${h.telefone}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">${cidadeUf}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">${statusBadge}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <a href="hospedes-form.html?id=${h.id}" class="text-blue-600 hover:text-blue-900 font-semibold mr-4 transition-all">Editar</a>
                        ${acaoStatus}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filtrarTabela() {
            const busca = document.getElementById('filtro-busca').value.toLowerCase();
            const status = document.getElementById('filtro-status').value;
            
            let hospedes = HotelDB.DAOs.hospedes.obterTudo();

            // Filtrar por busca
            if (busca) {
                hospedes = hospedes.filter(h => 
                    h.nome.toLowerCase().includes(busca) || 
                    h.cpf.includes(busca) ||
                    h.email.toLowerCase().includes(busca)
                );
            }

            // Filtrar por status
            if (status === 'ativos') {
                hospedes = hospedes.filter(h => !h.inativo);
            } else if (status === 'inativos') {
                hospedes = hospedes.filter(h => h.inativo);
            }

            renderizarTabela(hospedes);
        }

        // Modal de confirmação
        function confirmarAcao(id, acao) {
            hospedeSelecionadoId = id;
            acaoSelecionada = acao;
            
            const hospede = HotelDB.DAOs.hospedes.buscarPorId(id);
            if (!hospede) return;

            const modal = document.getElementById('modal-confirmacao');
            const titulo = document.getElementById('modal-titulo');
            const texto = document.getElementById('modal-texto');
            const btnConfirmar = document.getElementById('modal-btn-confirmar');

            if (acao === 'inativar') {
                titulo.innerText = 'Inativar Hóspede';
                texto.innerHTML = `Deseja realmente inativar o hóspede <strong>${hospede.nome}</strong>? Ele não poderá fazer novas reservas.`;
                btnConfirmar.className = 'px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl text-sm font-semibold shadow-lg shadow-red-600/15';
                btnConfirmar.onclick = executarInativacao;
            } else {
                titulo.innerText = 'Reativar Hóspede';
                texto.innerHTML = `Deseja reativar o hóspede <strong>${hospede.nome}</strong>?`;
                btnConfirmar.className = 'px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-xl text-sm font-semibold shadow-lg shadow-green-600/15';
                btnConfirmar.onclick = executarReativacao;
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.firstElementChild.classList.remove('scale-95');
                modal.firstElementChild.classList.add('scale-100');
            }, 50);
        }

        function fecharModal() {
            const modal = document.getElementById('modal-confirmacao');
            modal.firstElementChild.classList.remove('scale-100');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                hospedeSelecionadoId = null;
                acaoSelecionada = null;
            }, 200);
        }

        function executarInativacao() {
            if (!hospedeSelecionadoId) return;

            const response = HotelDB.Fachada.inativar('hospedes', hospedeSelecionadoId);
            if (response.sucesso) {
                window.mostrarToast('Hóspede inativado com sucesso!', 'sucesso');
                filtrarTabela();
            } else {
                window.mostrarToast(response.erro || 'Falha ao inativar hóspede.', 'erro');
            }
            fecharModal();
        }

        function executarReativacao() {
            if (!hospedeSelecionadoId) return;

            const response = HotelDB.Fachada.reativar('hospedes', hospedeSelecionadoId);
            if (response.sucesso) {
                window.mostrarToast('Hóspede reativado com sucesso!', 'sucesso');
                filtrarTabela();
            } else {
                window.mostrarToast(response.erro || 'Falha ao reativar hóspede.', 'erro');
            }
            fecharModal();
        }
    </script>
</body>
</html>
