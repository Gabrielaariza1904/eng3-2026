<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Pagamento - Hotel Imperial</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <!-- Main Content -->
    <main class="flex-1 p-8">
        <header>
            <h2>Registrar Pagamento</h2>
            <div>
                <a href="pagamentos-lista.html" class="text-blue-600 hover:text-blue-800 font-semibold text-sm flex items-center gap-1.5">
                    <span>⬅️</span> Voltar para Lista
                </a>
            </div>
        </header>

        <section class="glass-card p-8 rounded-2xl shadow-sm max-w-xl mx-auto fade-in-up">
            <form id="form-pagamento" class="space-y-6" onsubmit="salvarPagamento(event)">
                
                <!-- Selecionar Reserva -->
                <div>
                    <label for="reserva-id" class="block text-sm font-semibold text-slate-700 mb-2">Reserva Associada *</label>
                    <select id="reserva-id" required onchange="carregarDetalhesReserva()" class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all">
                        <option value="">Selecione uma Reserva...</option>
                        <!-- JS populará com reservas pendentes -->
                    </select>
                </div>

                <!-- Detalhes de Saldo Pendente (Mostrado quando reserva é selecionada) -->
                <div id="container-detalhe-reserva" class="p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs space-y-2 hidden">
                    <div class="flex justify-between">
                        <span class="text-slate-500">Hóspede:</span>
                        <span id="detalhe-hospede" class="font-bold text-slate-800">-</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-500">Valor Total da Reserva:</span>
                        <span id="detalhe-valor-total" class="font-bold text-slate-800">R$ 0,00</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-500">Valor Já Pago:</span>
                        <span id="detalhe-valor-pago" class="font-bold text-emerald-600">R$ 0,00</span>
                    </div>
                    <div class="flex justify-between border-t border-slate-200/60 pt-2 font-semibold">
                        <span class="text-slate-500">Saldo Pendente de Pagamento:</span>
                        <span id="detalhe-saldo-pendente" class="text-sm font-black text-amber-600">R$ 0,00</span>
                    </div>
                </div>

                <!-- Valor do Pagamento -->
                <div>
                    <label for="valor" class="block text-sm font-semibold text-slate-700 mb-2">Valor do Lançamento *</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-sm font-semibold text-slate-400">R$</span>
                        <input type="number" id="valor" min="0.01" step="0.01" required class="w-full border border-slate-200 rounded-xl p-3 pl-9 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="0.00">
                    </div>
                    <p class="text-[10px] text-slate-400 mt-1">É possível fazer lançamentos de valores parciais.</p>
                </div>

                <!-- Forma de Pagamento -->
                <div>
                    <label for="formaPagamento" class="block text-sm font-semibold text-slate-700 mb-2">Forma de Pagamento *</label>
                    <select id="formaPagamento" required class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all">
                        <option value="">Selecione...</option>
                        <option value="Pix">Pix</option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                        <option value="Cartão de Débito">Cartão de Débito</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                </div>

                <!-- Status Inicial -->
                <div>
                    <label for="status" class="block text-sm font-semibold text-slate-700 mb-2">Status do Lançamento *</label>
                    <select id="status" required class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all">
                        <option value="APROVADO">Aprovado (Confirmado)</option>
                        <option value="PENDENTE">Pendente (Aguardando compensação)</option>
                        <option value="NEGADO">Negado / Rejeitado</option>
                    </select>
                </div>

                <!-- Botões de Ação -->
                <div class="flex justify-end gap-4 border-t border-slate-100 pt-6">
                    <button type="button" onclick="window.location.href='pagamentos-lista.html'" class="px-6 py-3 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">Cancelar</button>
                    <button type="submit" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl text-sm shadow-lg shadow-blue-600/15 transition-all">Confirmar Lançamento</button>
                </div>
            </form>
        </section>
    </main>

    <!-- Scripts -->
    <script src="assets/js/db.js"></script>
    <script src="assets/js/layout.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            carregarReservasDropdown();
        });

        // Popula as reservas no select
        function carregarReservasDropdown() {
            const reservas = HotelDB.DAOs.reservas.obterTudo().filter(r => r.status !== 'CANCELADA');
            const hospedes = HotelDB.DAOs.hospedes.obterTudo();
            const pagamentos = HotelDB.DAOs.pagamentos.obterTudo();

            const select = document.getElementById('reserva-id');
            select.innerHTML = '<option value="">Selecione uma Reserva...</option>';

            reservas.forEach(r => {
                const hospede = hospedes.find(h => h.id == r.hospedeId);
                const nome = hospede ? hospede.nome : 'Desconhecido';
                
                // Calcular saldo pendente
                const totalPago = pagamentos
                    .filter(p => p.reservaId == r.id && p.status === 'APROVADO')
                    .reduce((sum, p) => sum + parseFloat(p.valor), 0);
                const saldoPendente = parseFloat(r.valorTotal) - totalPago;

                const opt = document.createElement('option');
                opt.value = r.id;
                opt.innerText = `Reserva #${r.id} - ${nome} (Pendente: R$ ${saldoPendente.toFixed(2)})`;
                
                // Salvar dados no dataset para consulta rápida
                opt.dataset.hospede = nome;
                opt.dataset.total = r.valorTotal;
                opt.dataset.pago = totalPago;
                opt.dataset.pendente = saldoPendente;

                select.appendChild(opt);
            });

            // Se vier reservaId nos parâmetros de query, pré-seleciona
            const urlParams = new URLSearchParams(window.location.search);
            const rId = urlParams.get('reservaId');
            if (rId) {
                select.value = rId;
                select.disabled = true; // Impedir alteração no formulário
                carregarDetalhesReserva();
            }
        }

        // Exibe os detalhes financeiros da reserva selecionada
        function carregarDetalhesReserva() {
            const select = document.getElementById('reserva-id');
            const container = document.getElementById('container-detalhe-reserva');
            const valorInput = document.getElementById('valor');

            if (!select.value) {
                container.classList.add('hidden');
                valorInput.value = '';
                return;
            }

            const selectedOption = select.options[select.selectedIndex];
            const hospede = selectedOption.dataset.hospede;
            const total = parseFloat(selectedOption.dataset.total);
            const pago = parseFloat(selectedOption.dataset.pago);
            const pendente = parseFloat(selectedOption.dataset.pendente);

            document.getElementById('detalhe-hospede').innerText = hospede;
            document.getElementById('detalhe-valor-total').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('detalhe-valor-pago').innerText = `R$ ${pago.toFixed(2)}`;
            document.getElementById('detalhe-saldo-pendente').innerText = `R$ ${pendente.toFixed(2)}`;
            
            container.classList.remove('hidden');
            
            // Pré-popular com o valor pendente se for maior que zero
            if (pendente > 0) {
                valorInput.value = pendente.toFixed(2);
                valorInput.max = pendente.toFixed(2); // Evitar lançar a mais que o pendente
            } else {
                valorInput.value = '0.00';
            }
        }

        function salvarPagamento(event) {
            event.preventDefault();

            // Ativar temporariamente select para capturar o valor no submit caso estivesse desativado
            const select = document.getElementById('reserva-id');
            select.disabled = false;

            const reservaId = select.value;
            const valor = parseFloat(document.getElementById('valor').value);
            const formaPagamento = document.getElementById('formaPagamento').value;
            const status = document.getElementById('status').value;

            if (!reservaId) {
                window.mostrarToast('Selecione a reserva associada.', 'erro');
                return;
            }

            const dados = {
                id: null,
                reservaId: parseInt(reservaId),
                dataPagamento: new Date().toISOString(),
                valor: valor,
                formaPagamento: formaPagamento,
                status: status
            };

            const response = HotelDB.Fachada.salvar('pagamentos', dados);

            if (response.sucesso) {
                window.mostrarToast('Lançamento de pagamento registrado com sucesso!', 'sucesso');
                setTimeout(() => {
                    window.location.href = 'pagamentos-lista.html';
                }, 1000);
            } else {
                window.mostrarToast(response.erro, 'erro');
                // Restaurar disable caso veio de query string
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('reservaId')) {
                    select.disabled = true;
                }
            }
        }
    </script>
</body>
</html>
