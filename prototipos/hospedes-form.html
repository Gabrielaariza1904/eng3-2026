<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Hóspede - Hotel Imperial</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <!-- Main Content -->
    <main class="flex-1 p-8">
        <header>
            <h2 id="form-titulo">Cadastrar Hóspede</h2>
            <div>
                <a href="hospedes-lista.html" class="text-blue-600 hover:text-blue-800 font-semibold text-sm flex items-center gap-1.5">
                    <span>⬅️</span> Voltar para Lista
                </a>
            </div>
        </header>

        <section class="glass-card p-8 rounded-2xl shadow-sm max-w-4xl mx-auto fade-in-up">
            <form id="form-hospede" class="space-y-8" onsubmit="salvarHospede(event)">
                <input type="hidden" id="hospede-id">

                <!-- Dados Pessoais -->
                <div>
                    <h3 class="text-lg font-bold text-slate-800 border-b border-slate-100 pb-3 mb-6 flex items-center gap-2">
                        <span class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center text-sm">👤</span>
                        Dados Pessoais
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="nome" class="block text-sm font-semibold text-slate-700 mb-2">Nome Completo *</label>
                            <input type="text" id="nome" required class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="Nome Completo">
                        </div>
                        <div>
                            <label for="cpf" class="block text-sm font-semibold text-slate-700 mb-2">CPF *</label>
                            <!-- Validação de padrão HTML5 para CPF formatado ou não -->
                            <input type="text" id="cpf" required pattern="(\\d{3}\\.\\d{3}\\.\\d{3}-\\d{2})|(\\d{11})" class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="000.000.000-00" oninput="mascaraCPF(this)">
                        </div>
                        <div>
                            <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">E-mail *</label>
                            <input type="email" id="email" required class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="email@exemplo.com">
                        </div>
                        <div>
                            <label for="telefone" class="block text-sm font-semibold text-slate-700 mb-2">Telefone *</label>
                            <input type="tel" id="telefone" required class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="(00) 00000-0000" oninput="mascaraTelefone(this)">
                        </div>
                    </div>
                </div>

                <!-- Endereço -->
                <div>
                    <h3 class="text-lg font-bold text-slate-800 border-b border-slate-100 pb-3 mb-6 flex items-center gap-2">
                        <span class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center text-sm">📍</span>
                        Endereço Residencial
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label for="cep" class="block text-sm font-semibold text-slate-700 mb-2">CEP *</label>
                            <div class="flex gap-2">
                                <input type="text" id="cep" required maxlength="9" class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="00000-000" oninput="mascaraCEP(this)" onblur="buscarCEP()">
                                <button type="button" onclick="buscarCEP()" class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold rounded-xl text-sm transition-colors" title="Buscar CEP Online">🔍</button>
                            </div>
                            <span id="cep-loader" class="text-xs text-blue-600 hidden mt-1">Buscando CEP...</span>
                        </div>
                        <div class="md:col-span-2">
                            <label for="logradouro" class="block text-sm font-semibold text-slate-700 mb-2">Logradouro (Rua, Avenida) *</label>
                            <input type="text" id="logradouro" required class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="Rua / Avenida">
                        </div>
                        <div>
                            <label for="numero" class="block text-sm font-semibold text-slate-700 mb-2">Número *</label>
                            <input type="text" id="numero" required class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="Nº">
                        </div>
                        <div>
                            <label for="complemento" class="block text-sm font-semibold text-slate-700 mb-2">Complemento</label>
                            <input type="text" id="complemento" class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="Ex: Apto 42">
                        </div>
                        <div>
                            <label for="bairro" class="block text-sm font-semibold text-slate-700 mb-2">Bairro *</label>
                            <input type="text" id="bairro" required class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="Bairro">
                        </div>
                        <div class="md:col-span-2">
                            <label for="cidade" class="block text-sm font-semibold text-slate-700 mb-2">Cidade *</label>
                            <input type="text" id="cidade" required class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all" placeholder="Cidade">
                        </div>
                        <div>
                            <label for="estado" class="block text-sm font-semibold text-slate-700 mb-2">Estado (UF) *</label>
                            <select id="estado" required class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-slate-800 text-sm transition-all">
                                <option value="">Selecione...</option>
                                <option value="AC">Acre (AC)</option>
                                <option value="AL">Alagoas (AL)</option>
                                <option value="AP">Amapá (AP)</option>
                                <option value="AM">Amazonas (AM)</option>
                                <option value="BA">Bahia (BA)</option>
                                <option value="CE">Ceará (CE)</option>
                                <option value="DF">Distrito Federal (DF)</option>
                                <option value="ES">Espírito Santo (ES)</option>
                                <option value="GO">Goiás (GO)</option>
                                <option value="MA">Maranhão (MA)</option>
                                <option value="MT">Mato Grosso (MT)</option>
                                <option value="MS">Mato Grosso do Sul (MS)</option>
                                <option value="MG">Minas Gerais (MG)</option>
                                <option value="PA">Pará (PA)</option>
                                <option value="PB">Paraíba (PB)</option>
                                <option value="PR">Paraná (PR)</option>
                                <option value="PE">Pernambuco (PE)</option>
                                <option value="PI">Piauí (PI)</option>
                                <option value="RJ">Rio de Janeiro (RJ)</option>
                                <option value="RN">Rio Grande do Norte (RN)</option>
                                <option value="RS">Rio Grande do Sul (RS)</option>
                                <option value="RO">Rondônia (RO)</option>
                                <option value="RR">Roraima (RR)</option>
                                <option value="SC">Santa Catarina (SC)</option>
                                <option value="SP">São Paulo (SP)</option>
                                <option value="SE">Sergipe (SE)</option>
                                <option value="TO">Tocantins (TO)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Campo Ativo/Inativo no formulário -->
                <div class="flex items-center gap-2 p-3 bg-slate-50 border border-slate-100 rounded-2xl w-fit">
                    <input type="checkbox" id="inativo" class="h-5 w-5 text-blue-600 focus:ring-blue-500 border-slate-200 rounded-lg">
                    <label for="inativo" class="text-sm font-semibold text-slate-700 cursor-pointer">Marcar hóspede como Inativo</label>
                </div>

                <!-- Botões de Ação -->
                <div class="flex justify-end gap-4 border-t border-slate-100 pt-6">
                    <button type="button" onclick="window.location.href='hospedes-lista.html'" class="px-6 py-3 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">Cancelar</button>
                    <button type="submit" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl text-sm shadow-lg shadow-blue-600/15 transition-all">Salvar Hóspede</button>
                </div>
            </form>
        </section>
    </main>

    <!-- Scripts -->
    <script src="assets/js/db.js"></script>
    <script src="assets/js/layout.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            detectarModoEdicao();
        });

        // Verifica se veio ID na URL e preenche para edição
        function detectarModoEdicao() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            
            if (id) {
                document.getElementById('form-titulo').innerText = 'Editar Hóspede';
                const hospede = HotelDB.DAOs.hospedes.buscarPorId(id);
                if (hospede) {
                    document.getElementById('hospede-id').value = hospede.id;
                    document.getElementById('nome').value = hospede.nome;
                    document.getElementById('cpf').value = hospede.cpf;
                    document.getElementById('email').value = hospede.email;
                    document.getElementById('telefone').value = hospede.telefone;
                    document.getElementById('inativo').checked = hospede.inativo;

                    if (hospede.endereco) {
                        document.getElementById('cep').value = hospede.endereco.cep;
                        document.getElementById('logradouro').value = hospede.endereco.logradouro;
                        document.getElementById('numero').value = hospede.endereco.numero;
                        document.getElementById('complemento').value = hospede.endereco.complemento;
                        document.getElementById('bairro').value = hospede.endereco.bairro;
                        document.getElementById('cidade').value = hospede.endereco.cidade;
                        document.getElementById('estado').value = hospede.endereco.estado;
                    }
                } else {
                    window.mostrarToast('Hóspede não encontrado!', 'erro');
                    setTimeout(() => window.location.href = 'hospedes-lista.html', 1500);
                }
            }
        }

        // Busca de CEP usando ViaCEP
        async function buscarCEP() {
            const cepInput = document.getElementById('cep');
            const cep = cepInput.value.replace(/\D/g, '');
            const loader = document.getElementById('cep-loader');

            if (cep.length !== 8) {
                return;
            }

            loader.classList.remove('hidden');

            try {
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                if (!response.ok) throw new Error('Falha na requisição');
                
                const data = await response.json();
                
                if (data.erro) {
                    window.mostrarToast('CEP não encontrado.', 'erro');
                } else {
                    document.getElementById('logradouro').value = data.logradouro || '';
                    document.getElementById('bairro').value = data.bairro || '';
                    document.getElementById('cidade').value = data.localidade || '';
                    document.getElementById('estado').value = data.uf || '';
                    
                    // Focar no número
                    document.getElementById('numero').focus();
                    window.mostrarToast('Endereço preenchido via CEP!', 'info');
                }
            } catch (err) {
                console.error('Erro ao buscar CEP:', err);
                window.mostrarToast('Não foi possível buscar o CEP online. Preencha manualmente.', 'info');
            } finally {
                loader.classList.add('hidden');
            }
        }

        // Máscaras de Entrada
        function mascaraCPF(input) {
            let v = input.value.replace(/\D/g, '');
            if (v.length > 11) v = v.substring(0, 11);
            if (v.length > 9) {
                input.value = `${v.substring(0,3)}.${v.substring(3,6)}.${v.substring(6,9)}-${v.substring(9)}`;
            } else if (v.length > 6) {
                input.value = `${v.substring(0,3)}.${v.substring(3,6)}.${v.substring(6)}`;
            } else if (v.length > 3) {
                input.value = `${v.substring(0,3)}.${v.substring(3)}`;
            } else {
                input.value = v;
            }
        }

        function mascaraTelefone(input) {
            let v = input.value.replace(/\D/g, '');
            if (v.length > 11) v = v.substring(0, 11);
            if (v.length > 10) {
                input.value = `(${v.substring(0,2)}) ${v.substring(2,7)}-${v.substring(7)}`;
            } else if (v.length > 6) {
                input.value = `(${v.substring(0,2)}) ${v.substring(2,6)}-${v.substring(6)}`;
            } else if (v.length > 2) {
                input.value = `(${v.substring(0,2)}) ${v.substring(2)}`;
            } else {
                input.value = v;
            }
        }

        function mascaraCEP(input) {
            let v = input.value.replace(/\D/g, '');
            if (v.length > 8) v = v.substring(0, 8);
            if (v.length > 5) {
                input.value = `${v.substring(0,5)}-${v.substring(5)}`;
            } else {
                input.value = v;
            }
        }

        // Salvar Hóspede via Fachada
        function salvarHospede(event) {
            event.preventDefault();

            const id = document.getElementById('hospede-id').value;
            const dados = {
                id: id ? parseInt(id) : null,
                nome: document.getElementById('nome').value.trim(),
                cpf: document.getElementById('cpf').value.trim(),
                email: document.getElementById('email').value.trim(),
                telefone: document.getElementById('telefone').value.trim(),
                inativo: document.getElementById('inativo').checked,
                endereco: {
                    logradouro: document.getElementById('logradouro').value.trim(),
                    numero: document.getElementById('numero').value.trim(),
                    cep: document.getElementById('cep').value.trim(),
                    bairro: document.getElementById('bairro').value.trim(),
                    complemento: document.getElementById('complemento').value.trim(),
                    cidade: document.getElementById('cidade').value.trim(),
                    estado: document.getElementById('estado').value.trim()
                }
            };

            const response = HotelDB.Fachada.salvar('hospedes', dados);

            if (response.sucesso) {
                window.mostrarToast(id ? 'Hóspede atualizado com sucesso!' : 'Hóspede cadastrado com sucesso!', 'sucesso');
                setTimeout(() => {
                    window.location.href = 'hospedes-lista.html';
                }, 1000);
            } else {
                window.mostrarToast(response.erro, 'erro');
            }
        }
    </script>
</body>
</html>
